name: Create Lab Files (5 Files, 10 Slots)

on:
  workflow_dispatch:
    inputs:
      # File Names
      filename1:
        description: 'File 1 Name'
        required: true
        default: 'lab-results-1'
      filename2:
        description: 'File 2 Name (Optional)'
        default: 'None'
      filename3:
        description: 'File 3 Name (Optional)'
        default: 'None'
      filename4:
        description: 'File 4 Name (Optional)'
        default: 'None'
      filename5:
        description: 'File 5 Name (Optional)'
        default: 'None'
      # Slot 1
      name1:
        description: 'Chapter 1 Name'
      type1:
        type: choice
        description: 'Chapter 1 Type'
        options: [None, Walkthrough, Exercise, Walkthrough & Exercise]
        default: None
      # ... [Slots 2 through 9 omitted for brevity, keep your existing slot definitions here]
      # Slot 10
      name10:
        description: 'Chapter 10 Name'
      type10:
        type: choice
        options: [None, Walkthrough, Exercise, Walkthrough & Exercise]
        default: None

permissions:
  contents: write

jobs:
  create-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate File Content
        run: |
          # Create an array of the 5 potential filenames
          FILES=("${{ github.event.inputs.filename1 }}" "${{ github.event.inputs.filename2 }}" "${{ github.event.inputs.filename3 }}" "${{ github.event.inputs.filename4 }}" "${{ github.event.inputs.filename5 }}")
          
          # Function to write entries to a specific file
          write_entries_to_file() {
            local TARGET_FILE="$1"
            
            # Helper to check and write
            write_row() {
              local entry_name="$1"
              local entry_type="$2"
              if [ "$entry_type" != "None" ] && [ -n "$entry_name" ]; then
                echo "$entry_name,$entry_type" >> "$TARGET_FILE"
              fi
            }

            write_row "${{ github.event.inputs.name1 }}" "${{ github.event.inputs.type1 }}"
            write_row "${{ github.event.inputs.name2 }}" "${{ github.event.inputs.type2 }}"
            write_row "${{ github.event.inputs.name3 }}" "${{ github.event.inputs.type3 }}"
            write_row "${{ github.event.inputs.name4 }}" "${{ github.event.inputs.type4 }}"
            write_row "${{ github.event.inputs.name5 }}" "${{ github.event.inputs.type5 }}"
            write_row "${{ github.event.inputs.name6 }}" "${{ github.event.inputs.type6 }}"
            write_row "${{ github.event.inputs.name7 }}" "${{ github.event.inputs.type7 }}"
            write_row "${{ github.event.inputs.name8 }}" "${{ github.event.inputs.type8 }}"
            write_row "${{ github.event.inputs.name9 }}" "${{ github.event.inputs.type9 }}"
            write_row "${{ github.event.inputs.name10 }}" "${{ github.event.inputs.type10 }}"
          }

          # Loop through the filenames and generate if not "None"
          for FILE in "${FILES[@]}"; do
            if [ "$FILE" != "None" ] && [ -n "$FILE" ]; then
              FULL_FILENAME="${FILE}.txt"
              > "$FULL_FILENAME"
              write_entries_to_file "$FULL_FILENAME"
              echo "Created $FULL_FILENAME"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.txt
          git commit -m "docs: batch create lab files via workflow" || echo "No changes to commit"
          git push
